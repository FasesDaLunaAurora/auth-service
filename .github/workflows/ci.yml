name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: auth_service
          POSTGRES_PASSWORD: auth_service
          POSTGRES_DB: auth_service_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U auth_service -d auth_service_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://auth_service:auth_service@localhost:5432/auth_service_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret-key-not-for-production-use-only-1234
      APP_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Lint (Ruff)
        run: ruff check .

      - name: Format check (Ruff)
        run: ruff format --check .

      - name: Type check (Mypy)
        run: mypy app

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests (Pytest)
        run: pytest --cov=app --cov-report=term-missing -v
